version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: llm-backend
    ports:
      - "5000:5000"
    volumes:
      - ~/.aws:/root/.aws:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: llm-frontend
    environment:
      BACKEND_URL: http://backend:5000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:

